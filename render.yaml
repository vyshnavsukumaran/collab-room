services:
  - type: web
    name: collabroom-backend
    env: node
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: collabroom-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # Add NEXT_PUBLIC_API_URL or similar if your backend needs to know about the frontend origin for CORS
      - key: FRONTEND_URL
        value: "" # You will set this to your Vercel URL later

databases:
  - name: collabroom-db
    databaseName: collabroom
    user: collabroom_user
    plan: free
